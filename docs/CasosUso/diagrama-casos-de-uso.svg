<svg width="100%" viewBox="0 0 680 1680" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .uc-box { fill: #f5f5f5; stroke: #888; stroke-width: 0.8; }
    .system-box { fill: none; stroke: #aaa; stroke-width: 1.2; }
    .actor-line { stroke: #222; stroke-width: 1.5; fill: none; }
    .actor-fill { fill: white; stroke: #222; stroke-width: 1.5; }
    .assoc { stroke: #555; stroke-width: 0.9; fill: none; }
    .assoc-ext { stroke: #888; stroke-width: 0.8; stroke-dasharray: 4 3; fill: none; }
    .include-lbl { font-size: 10px; fill: #777; font-family: Arial, sans-serif; }
    .system-lbl { font-size: 13px; fill: #555; font-family: Arial, sans-serif; font-weight: 500; }
    .actor-lbl { font-size: 11px; fill: #222; font-family: Arial, sans-serif; text-anchor: middle; }
    .uc-lbl { font-size: 11px; fill: #222; font-family: Arial, sans-serif; text-anchor: middle; dominant-baseline: central; }
    .uc-id { font-size: 9px; fill: #999; font-family: Arial, sans-serif; text-anchor: middle; dominant-baseline: central; }
  </style>
</defs>

